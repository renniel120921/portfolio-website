<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Updating | Salazar Renniel</title>
  <link rel="icon" href="images/bago.jpg" type="image/jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Inter"', 'sans-serif'] },
          colors: {
            bgMain: '#F3F4F6', darkText: '#111827', mutedText: '#6B7280',
            dmBg: '#0f172a', dmCard: '#1e293b', dmText: '#f8fafc',
            dmMuted: '#94a3b8', dmBorder: '#334155',
          }
        }
      }
    }
  </script>

  <style>
    body { transition: background-color 0.3s ease, color 0.3s ease; }
    body { background-color: #F3F4F6; color: #111827; }
    html.dark body { background-color: #0f172a; color: #f8fafc; }
    .card { background-color: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 1rem; padding: 2rem; }
    html.dark .card { background-color: #1e293b; border-color: #334155; }
  </style>
</head>
<body class="antialiased h-screen flex flex-col items-center justify-center px-4 relative">

  <div class="absolute top-6 right-4 md:right-8 z-50">
    <button id="theme-toggle" class="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-full p-1 w-12 h-7 flex items-center relative transition-colors shadow-sm cursor-pointer hover:scale-105">
        <div id="toggle-circle" class="w-5 h-5 bg-yellow-400 rounded-full shadow-md transform transition-transform duration-300 translate-x-0.5 flex items-center justify-center">
            <i id="toggle-icon" class="fa-solid fa-sun text-white text-[9px]"></i>
        </div>
    </button>
  </div>

  <div class="card max-w-md w-full text-center shadow-xl shadow-blue-500/5">

    <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-file-pen text-4xl text-blue-600 dark:text-blue-400 animate-pulse"></i>
    </div>

    <h1 class="text-2xl font-bold text-darkText dark:text-white mb-3">Polishing My Resume</h1>

    <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed mb-8">
      I am currently tailoring my CV for the <b>2026 Internship Season</b> to include my latest projects like SmartBasura. It will be available for download very soon.
    </p>

    <div class="space-y-3">
        <button onclick="history.back()" class="w-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-semibold py-3 rounded-xl hover:opacity-90 transition-opacity">
            Go Back
        </button>

        <a href="mailto:rennielsalazar948@gmail.com" class="block w-full bg-transparent border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 font-semibold py-3 rounded-xl hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors">
            Request via Email
        </a>
    </div>

  </div>

  <footer class="absolute bottom-6 text-center text-xs text-gray-400 dark:text-gray-600">
    &copy; 2026 Salazar Renniel
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const toggleCircle = document.getElementById('toggle-circle');
    const toggleIcon = document.getElementById('toggle-icon');
    const html = document.documentElement;

    if (localStorage.getItem('theme') === 'dark') {
        html.classList.add('dark');
        setDarkAppearance();
    } else {
        setLightAppearance();
    }

    function setDarkAppearance() {
        toggleCircle.classList.remove('bg-yellow-400', 'translate-x-0.5');
        toggleCircle.classList.add('bg-slate-900', 'translate-x-5');
        toggleIcon.classList.remove('fa-sun', 'text-white');
        toggleIcon.classList.add('fa-moon', 'text-yellow-400');
    }

    function setLightAppearance() {
        toggleCircle.classList.add('bg-yellow-400', 'translate-x-0.5');
        toggleCircle.classList.remove('bg-slate-900', 'translate-x-5');
        toggleIcon.classList.add('fa-sun', 'text-white');
        toggleIcon.classList.remove('fa-moon', 'text-yellow-400');
    }

    toggleBtn.addEventListener('click', () => {
        html.classList.toggle('dark');
        if (html.classList.contains('dark')) {
            localStorage.setItem('theme', 'dark');
            setDarkAppearance();
        } else {
            localStorage.setItem('theme', 'light');
            setLightAppearance();
        }
    });
  </script>
</body>
</html>
